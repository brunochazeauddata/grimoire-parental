<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#1a0033" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Le Grimoire">
    
    <title>Le Grimoire Parental</title>
    
    <!-- Fonts: Cinzel for headers (Magical/Grimoire), Quicksand for body (Readable/Soft) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Icons Config -->
    <link rel="icon" type="image/png" href="assets/images/app_icon.png" />
    <link rel="apple-touch-icon" href="assets/images/app_icon.png" />

    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #1a0033; /* Violet Nuit requested */
        font-family: 'Quicksand', sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        user-select: none; /* App-like feel */
      }
      * {
        box-sizing: border-box;
      }

      /* Splash Screen Styles (Visible before React loads) */
      #splash-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #1a0033;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10000;
      }
      
      .splash-logo {
        width: 140px;
        height: 140px;
        margin-bottom: 24px;
        object-fit: contain;
        filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
        animation: breath 3s infinite ease-in-out;
      }
      
      .splash-text {
        font-family: 'Cinzel', serif;
        color: #ffd700;
        font-size: 1.8rem;
        letter-spacing: 2px;
        text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        opacity: 0;
        animation: fadeIn 1s ease-out forwards 0.5s;
      }

      @keyframes breath {
        0% { transform: scale(0.95); opacity: 0.9; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.9; }
      }
      @keyframes fadeIn {
        to { opacity: 1; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root">
      <!-- Native Splash Screen -->
      <div id="splash-loader">
        <img src="assets/images/splash_logo.png" alt="Grimoire Logo" class="splash-logo" onerror="this.style.display='none'" />
        <div class="splash-text">Le Grimoire</div>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
